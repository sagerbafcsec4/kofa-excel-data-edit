<style>
  :root{ --green:#217346; --green2:#2d9c5f; --bg:#f4f6f8; --card:#fff; --ink:#1f2933; --muted:#677; }

  body{ margin:0; font-family:"Segoe UI","Meiryo",system-ui,sans-serif; background:var(--bg); color:var(--ink); }

  #drop strong{ color:var(--ink); }
  ul#files{ list-style:none; padding:0; margin:12px 0 0; }
  ul#files li{ padding:6px 10px; background:#f0f3f5; border-radius:6px; margin-bottom:6px; font-size:.9rem; display:flex; justify-content:space-between; }
  label.chk{ display:flex; align-items:center; gap:8px; font-size:.95rem; cursor:pointer; }
  button{ font:inherit; border:0; border-radius:8px; padding:11px 20px; cursor:pointer; }
  button.primary{ background:var(--green); color:#fff; font-weight:700; }
  button.primary:disabled{ background:#9bb5a8; cursor:not-allowed; }
  button.sub{ background:#eef2f4; color:var(--ink); }
  #status{ font-size:.88rem; color:var(--muted); margin-top:8px; }
  #log{ background:#0f1720; color:#cfe8d8; font-family:Consolas,monospace; font-size:.8rem; border-radius:8px; padding:12px; height:230px; overflow:auto; white-space:pre-wrap; }
  .dl{ display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
  .dl a{ text-decoration:none; background:#eef7f0; color:var(--green); border:1px solid #cfe6d8; padding:8px 12px; border-radius:8px; font-size:.88rem; }

  @keyframes s{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>Excelデータ加工</h1>
  <p>サッカー記録ブックを読み込ませるだけで、レイアウト整形（列幅・フォント・縮小表示・不要列/行/シート削除・印刷範囲）を自動で行います。元ファイルは変更せず、整形済みファイルをダウンロードします。</p>
</header>
<main>
  <div class="card">
    <h2><span class="num">1</span>Excelファイルを読み込む（.xlsx・複数可）</h2>
    <div id="drop">
      ここに <strong>.xlsx</strong> をドラッグ＆ドロップ、またはクリックして選択
      <input id="file" type="file" accept=".xlsx" multiple hidden>
    </div>
    <ul id="files"></ul>
  </div>

  <div class="card">
    <h2><span class="num">2</span>設定</h2>
    <label class="chk"><input id="delK" type="checkbox" checked> 「経歴」シートを削除する</label>
  </div>

  <div class="card">
    <h2><span class="num">3</span>実行</h2>
    <button id="run" class="primary" disabled>▶ 実行</button>
    <div id="status"><span class="spin"></span> エンジン準備中…（初回は数十秒）</div>
  </div>

  <div class="card">
    <h2><span class="num">4</span>結果</h2>
    <div id="dl" class="dl"></div>
    <p class="note">複数ファイルは「ZIPでまとめてダウンロード」が便利です。</p>
    <h2 style="margin-top:14px;">ログ</h2>
    <div id="log"></div>
  </div>
</main>

<script type="text/python" id="engine">
#!/usr/bin/env python3
# -*- coding: utf-8 -*-
"""
サッカー記録ワークブック バッチ整形スクリプト (excel-data skill 準拠)

原則:
  - 入力データ(セルの値)は絶対に変更しない。整形・削除(行/列/シート)のみ。
  - 元ファイルは触らない。コピーを _processed/ に出力する。
  - 全ての削除・整形を _logs/ に記録する。

使い方:
  python format_records.py                  # フォルダ内 *.xlsx を全処理
  python format_records.py FILE.xlsx ...    # 指定ファイルのみ
  python format_records.py --delete-keireki # 「経歴」を削除(起動時の質問を省略)
  python format_records.py --keep-keireki   # 「経歴」を保持(起動時の質問を省略)

「経歴」シートの扱いはフラグ未指定なら起動時に確認する。
全シート(出場記録/シーズン/表記/経歴/フォーメーション)を名前ではなくヘッダー構造で判定する。
"""
import sys, os, glob
from datetime import datetime
import openpyxl
from openpyxl.utils import get_column_letter
from copy import copy

try:
    BASE = os.path.dirname(os.path.abspath(__file__))
except NameError:        # ブラウザ(Pyodide)等で __file__ が無い場合
    BASE = os.getcwd()
OUT  = os.path.join(BASE, "_processed")
LOGS = os.path.join(BASE, "_logs")
DELETE_KEIREKI = None   # main() で確定(True=削除 / False=保持)

def is_empty(v):
    return v is None or (isinstance(v, str) and v.strip() == "")

def jwidth(text):
    w = 0
    for ch in str(text):
        w += 2 if ord(ch) > 0x2E7F else 1
    return w

def set_font_size(cell, size):
    f = copy(cell.font); f.size = size; cell.font = f

def set_shrink(cell):
    a = copy(cell.alignment); a.shrink_to_fit = True; cell.alignment = a

def read_grid(ws):
    return [list(row) for row in ws.iter_rows(values_only=True)]

def g(grid, r, c):
    if 1 <= r <= len(grid) and 1 <= c <= len(grid[r-1]):
        return grid[r-1][c-1]
    return None

def last_data_row(grid, c1, c2):
    last = 1
    for r in range(1, len(grid) + 1):
        row = grid[r-1]
        for c in range(c1, min(c2, len(row)) + 1):
            if not is_empty(row[c-1]):
                last = r; break
    return last

def col_empty(grid, c, r1, r2):
    for r in range(r1, r2 + 1):
        if not is_empty(g(grid, r, c)):
            return False
    return True

WIDTHS = {"節":10,"開催日":10,"H":3,"A":3,"ｽｺｱ":8,"スコア":8,"対戦相手":30,"退場":20,"NEWS":60}

def fmt_season(ws, log):
    grid = read_grid(ws)
    last = last_data_row(grid, 1, 18)
    for cd in ws.column_dimensions.values():
        cd.hidden = False
    score_cols = [c for c in range(1, 19)
                  if isinstance(g(grid, 2, c), str) and g(grid, 2, c).strip().startswith("得点")]
    del_score = []
    if score_cols:
        start = score_cols[0]; block = list(range(start, start + 8))
        del_score = [block[i] for i in range(len(block) - 1, 2, -1) if col_empty(grid, block[i], 3, last)]
    del_empty = [c for c in range(1, 19) if is_empty(g(grid, 2, c)) and col_empty(grid, c, 2, last)]
    for c in sorted(set(del_score) | set(del_empty), reverse=True):
        lab = "得点空" if c in del_score else "空ヘッダー"
        log(f"  {get_column_letter(c)}({lab}) -> 削除")
        ws.delete_cols(c, 1)
    grid = read_grid(ws)
    fmax = max((c for c in range(1, 26) if not is_empty(g(grid, 2, c))), default=18)
    for row in ws.iter_rows(min_row=2, max_row=last, min_col=1, max_col=fmax):
        for cell in row:
            set_font_size(cell, 11); set_shrink(cell)
    for c in range(1, fmax + 1):
        h = g(grid, 2, c)
        h = h.strip() if isinstance(h, str) else h
        if h in WIDTHS:
            w = WIDTHS[h]
        elif isinstance(h, str) and (h.startswith("得点") or h.isdigit()):
            w = 20
        else:
            continue
        ws.column_dimensions[get_column_letter(c)].width = w
        log(f"  幅 {get_column_letter(c)}('{h}') -> {w}")

PLAY_POS = {"GK","DF","MF","FW"}

def fmt_appearance(ws, log):
    grid = read_grid(ws)
    H = 8
    maxc = max((len(r) for r in grid), default=0)
    last = last_data_row(grid, 1, maxc)
    w = max((jwidth(g(grid, r, 3)) for r in range(1, last+1) if not is_empty(g(grid, r, 3))), default=0)
    if w:
        ws.column_dimensions["C"].width = min(w + 2, 40)
        log(f"  名前列 C autofit -> {ws.column_dimensions['C'].width}")
    def match_empty_2row(r1, r2):
        for r in (r1, r2):
            for c in range(H, maxc + 1):
                if not is_empty(g(grid, r, c)):
                    return False
        return True
    del_players = []
    r = 6
    while r <= last:
        pos = g(grid, r, 1)
        pos_s = pos.strip() if isinstance(pos, str) else pos
        if pos_s in PLAY_POS:
            if is_empty(g(grid, r, 2)) and match_empty_2row(r, r+1):
                del_players.append((r, g(grid, r, 3)))
            r += 2
        else:
            r += 1
    for r, name in sorted(del_players, reverse=True):
        log(f"  記録ゼロ選手 行{r}-{r+1} '{name}' -> 2行削除")
        ws.delete_rows(r, 2)
    grid2 = read_grid(ws)
    maxc2 = max((len(r) for r in grid2), default=0)
    last2 = last_data_row(grid2, 1, maxc2)
    def match_unplayed(c):
        if not is_empty(g(grid2, 4, c)):
            return False
        for cc in (c, c+1):
            for r in range(6, last2 + 1):
                if not is_empty(g(grid2, r, cc)):
                    return False
        return True
    leftmost = None
    c = H
    while c <= maxc2:
        if match_unplayed(c):
            leftmost = c; break
        c += 2
    if leftmost is not None:
        cut = leftmost + 2
        if cut <= maxc2:
            n = maxc2 - cut + 1
            log(f"  未実施試合 {get_column_letter(cut)}:{get_column_letter(maxc2)} ({n}列) -> 削除")
            ws.delete_cols(cut, n)

PANELS = [(2,25),(26,49),(50,73),(74,97)]
PRINT_AREA = {1:"A1:Y49",2:"A1:AW49",3:"A1:BU49",4:"A1:CS49"}

def fmt_formation(ws, wb, log):
    grid = read_grid(ws)
    n = 0
    for r1, r2 in ((1,49),(50,97)):
        for c1, c2 in PANELS:
            cnt = 0
            for r in range(r1, r2 + 1):
                for c in range(c1, c2 + 1):
                    if not is_empty(g(grid, r, c)):
                        cnt += 1
                if cnt >= 4: break
            if cnt >= 4: n += 1
    log(f"  フォーメーション数 = {n}")
    if n == 0:
        log(f"  -> 空シート '{ws.title}' 削除"); wb.remove(ws); return
    if n <= 4:
        ws.print_area = PRINT_AREA[n]; log(f"  -> 印刷範囲 {PRINT_AREA[n]}")
    else:
        log(f"  -> 5試合以上、印刷範囲は変更なし")

def fmt_hyoki(ws, log):
    grid = read_grid(ws)
    maxc = max((len(r) for r in grid), default=0)
    last = last_data_row(grid, 1, maxc)
    for c in range(1, maxc + 1):
        maxw = 0; has_text = False
        for r in range(1, last + 1):
            v = g(grid, r, c)
            if is_empty(v): continue
            if isinstance(v, str) and not v.replace(".","").replace("-","").isdigit():
                has_text = True
            maxw = max(maxw, jwidth(v))
        if has_text and maxw:
            ws.column_dimensions[get_column_letter(c)].width = min(maxw + 2, 50)

def _row_set(ws, r, cmax=14):
    """指定行の非空ヘッダー文字列の集合"""
    s = set()
    for c in range(1, cmax + 1):
        v = ws.cell(r, c).value
        if v not in (None, "") and str(v).strip() != "":
            s.add(str(v).strip())
    return s

def _cell(ws, r, c):
    v = ws.cell(r, c).value
    return str(v).strip() if v not in (None, "") else ""

# ---- 構造判定: シートタイプを名前に依存せずヘッダー構造で判別 ----------------
def is_appearance_sheet(ws):
    """§A 出場記録: D1='出場記録'、または 行4 が Pos/No/Name。"""
    if _cell(ws, 1, 4) == "出場記録":
        return True
    return _cell(ws, 4, 1) == "Pos" and _cell(ws, 4, 2) == "No" and _cell(ws, 4, 3) == "Name"

def is_season_sheet(ws):
    """§B シーズン記録: 行2 に『節』『開催日』『対戦相手』。"""
    h = _row_set(ws, 2)
    return "節" in h and "開催日" in h and "対戦相手" in h

def is_hyoki_sheet(ws):
    """§D 表記: 行2 に『統一表記』(このシート固有)。"""
    return "統一表記" in _row_set(ws, 2)

def is_keireki_sheet(ws):
    """§E 経歴: 行2 に『主な下部組織』『経歴』(このシート固有)。"""
    h = _row_set(ws, 2)
    return "主な下部組織" in h and "経歴" in h

def is_formation_sheet(ws):
    """名前に依存せず構造で判定。4列×2行のパネルグリッド(最終列が CS=97 付近)を
    持つシートを §C とする。出場記録/シーズン/表記/経歴 は呼び出し側で先に除外済み。"""
    return 90 <= ws.max_column <= 110

def process_wb(wb, log):
    """開いた Workbook を構造判定で整形する(ディスク/メモリ共通)。"""
    for ws in list(wb.worksheets):
        t = ws.title
        if is_appearance_sheet(ws):
            log(f"[§A 出場記録] {t}"); fmt_appearance(ws, log)
        elif is_season_sheet(ws):
            log(f"[§B シーズン] {t}"); fmt_season(ws, log)
        elif is_hyoki_sheet(ws):
            log(f"[§D 表記] {t}"); fmt_hyoki(ws, log)
        elif is_keireki_sheet(ws):
            if DELETE_KEIREKI:
                log(f"[§E 経歴] {t} -> 削除"); wb.remove(ws)
            else:
                log(f"[§E 経歴] {t} -> 保持")
        elif is_formation_sheet(ws):
            log(f"[§C フォーメーション] {t}"); fmt_formation(ws, wb, log)
        else:
            log(f"[--] {t} -> 対象外シート、スキップ")
    return wb

def process(path, log):
    return process_wb(openpyxl.load_workbook(path), log)

def resolve_keireki():
    if "--delete-keireki" in sys.argv: return True
    if "--keep-keireki" in sys.argv:   return False
    try:
        ans = input("「経歴」シートを削除しますか? [y=削除 / N=保持] : ").strip().lower()
    except EOFError:
        ans = ""
    return ans in ("y", "yes")

def run(inputs, delete_keireki, progress=None):
    """GUI/CLI 共通エンジン。inputs=フォルダ or ファイルのリスト。
    出力は入力フォルダ直下の _processed / _logs。progress(str) で進捗通知。"""
    global DELETE_KEIREKI
    DELETE_KEIREKI = delete_keireki
    def emit(s):
        (progress or (lambda x: print(x, flush=True)))(s)
    files = []; base = None
    for p in inputs:
        if os.path.isdir(p):
            base = p
            files += sorted(glob.glob(os.path.join(p, "*.xlsx")))
        elif p.lower().endswith(".xlsx"):
            files.append(p)
    files = [f for f in files if not os.path.basename(f).startswith("~$")]
    if not files:
        emit("対象の .xlsx が見つかりませんでした。")
        return None, []
    if base is None:
        base = os.path.dirname(os.path.abspath(files[0]))
    out_dir = os.path.join(base, "_processed")
    logs_dir = os.path.join(base, "_logs")
    os.makedirs(out_dir, exist_ok=True); os.makedirs(logs_dir, exist_ok=True)
    emit("経歴シート: " + ("削除" if delete_keireki else "保持"))
    stamp = datetime.now().strftime("%Y%m%d_%H%M%S")
    results = []
    for f in files:
        name = os.path.basename(f)
        if os.path.dirname(os.path.abspath(f)) == os.path.abspath(out_dir):
            continue
        lines = []
        def log(s, lines=lines): lines.append(s); emit(s)
        emit(f"\n===== {name} =====")
        try:
            wb = process(f, log)
            wb.save(os.path.join(out_dir, name))
            log(f"保存 -> _processed/{name}")
            results.append((name, "OK"))
        except Exception as e:
            log(f"!! エラー: {e}")
            results.append((name, f"ERROR: {e}"))
        with open(os.path.join(logs_dir, f"{name}.{stamp}.log"), "w", encoding="utf-8") as fp:
            fp.write("\n".join(lines))
    ok = sum(1 for _, s in results if s == "OK")
    emit(f"\n完了: {ok}/{len(results)} ファイル処理。出力先: {out_dir}")
    return out_dir, results

def main():
    inputs = [a for a in sys.argv[1:] if not a.startswith("-")]
    if not inputs:
        inputs = [BASE]
    run(inputs, resolve_keireki())

# ===== Web(ブラウザ)用アダプタ =====
import io, zipfile
_OUTPUTS = {}
def reset_outputs():
    _OUTPUTS.clear()
def process_one(name, data, delete_keireki):
    global DELETE_KEIREKI
    DELETE_KEIREKI = bool(delete_keireki)
    logs = []
    wb = openpyxl.load_workbook(io.BytesIO(bytes(data)))
    process_wb(wb, lambda s: logs.append(s))
    bio = io.BytesIO(); wb.save(bio)
    _OUTPUTS[name] = bio.getvalue()
    return "\n".join(logs)
def get_output(name):
    return _OUTPUTS.get(name, b"")
def make_zip():
    buf = io.BytesIO()
    with zipfile.ZipFile(buf, "w", zipfile.ZIP_DEFLATED) as z:
        for nm, b in _OUTPUTS.items():
            z.writestr(nm, b)
    return buf.getvalue()

</script>

<script src="https://cdn.jsdelivr.net/pyodide/v0.27.7/full/pyodide.js"></script>
<script>
let pyodide=null, ready=false, selected=[];
const $=id=>document.getElementById(id);
const logEl=$("log"), statusEl=$("status"), runBtn=$("run");
function log(s){ logEl.textContent += s + "\n"; logEl.scrollTop=logEl.scrollHeight; }

async function init(){
  try{
    pyodide = await loadPyodide({ indexURL:"https://cdn.jsdelivr.net/pyodide/v0.27.7/full/" });
    statusEl.innerHTML = '<span class="spin"></span> 部品を取得中（openpyxl）…';
    await pyodide.loadPackage("micropip");
    await pyodide.runPythonAsync(`
import micropip
await micropip.install(["openpyxl","et_xmlfile"])
`);
    await pyodide.runPythonAsync($("engine").textContent);
    ready=true; updateRun();
    statusEl.textContent = "✅ 準備完了。ファイルを選んで「実行」を押してください。";
  }catch(e){
    statusEl.textContent = "⚠ エンジンの初期化に失敗: " + e;
  }
}

function updateRun(){ runBtn.disabled = !(ready && selected.length>0); }

function showFiles(){
  const ul=$("files"); ul.innerHTML="";
  selected.forEach(f=>{
    const li=document.createElement("li");
    li.innerHTML = "<span>"+f.name+"</span><span>"+Math.round(f.size/1024)+" KB</span>";
    ul.appendChild(li);
  });
}

// ファイル選択 / ドラッグ&ドロップ
const drop=$("drop"), fileInput=$("file");
drop.onclick=()=>fileInput.click();
fileInput.onchange=e=>{ selected=[...e.target.files].filter(f=>f.name.toLowerCase().endsWith(".xlsx")); showFiles(); updateRun(); };
["dragenter","dragover"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("hover");}));
["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("hover");}));
drop.addEventListener("drop",e=>{ selected=[...e.dataTransfer.files].filter(f=>f.name.toLowerCase().endsWith(".xlsx")); showFiles(); updateRun(); });

function toU8(ret){ return (ret && ret.toJs) ? ret.toJs() : ret; }
function download(name, u8){
  const blob=new Blob([u8],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name; a.textContent="⬇ "+name;
  return a;
}

runBtn.onclick=async()=>{
  if(!ready) return;
  runBtn.disabled=true; logEl.textContent=""; $("dl").innerHTML="";
  const delK=$("delK").checked;
  pyodide.globals.get("reset_outputs")();
  const procOne=pyodide.globals.get("process_one");
  const getOut=pyodide.globals.get("get_output");
  let okCount=0;
  for(const f of selected){
    log("\n===== "+f.name+" =====");
    try{
      const buf=new Uint8Array(await f.arrayBuffer());
      const logStr=procOne(f.name, buf, delK);
      log(logStr);
      const out=toU8(getOut(f.name));
      $("dl").appendChild(download(f.name, out));
      okCount++;
    }catch(e){ log("!! エラー: "+e); }
  }
  // ZIP
  if(okCount>1){
    try{
      const zip=toU8(pyodide.globals.get("make_zip")());
      const a=document.createElement("a");
      a.href=URL.createObjectURL(new Blob([zip],{type:"application/zip"}));
      a.download="Excelデータ加工_processed.zip"; a.textContent="⬇ ZIPでまとめてダウンロード";
      a.style.fontWeight="700";
      $("dl").appendChild(a);
    }catch(e){ log("ZIP作成エラー: "+e); }
  }
  log("\n完了: "+okCount+"/"+selected.length+" ファイル");
  runBtn.disabled=false;
};

init();
</script>
</body>
